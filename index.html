<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Quote Generator</title>
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #f1f5f9;
      --muted: #94a3b8;
      --pill-bg: #334155;
      --pill-active-text: #fff;
      --accent: #818cf8;
      --accent-hover: #6366f1;
      --accent-glow: rgba(129, 140, 248, 0.12);
    }

    [data-theme="light"] {
      --bg: #f1f5f9;
      --card: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --pill-bg: #e2e8f0;
    }

    [data-color="ocean"]  { --accent: #22d3ee; --accent-hover: #06b6d4; --accent-glow: rgba(34, 211, 238, 0.12); }
    [data-color="forest"] { --accent: #4ade80; --accent-hover: #22c55e; --accent-glow: rgba(74, 222, 128, 0.12); }
    [data-color="sunset"] { --accent: #fb923c; --accent-hover: #f97316; --accent-glow: rgba(251, 146, 60, 0.12); }
    [data-color="rose"]   { --accent: #fb7185; --accent-hover: #f43f5e; --accent-glow: rgba(251, 113, 133, 0.12); }

    body {
      font-family: "Georgia", "Times New Roman", serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      transition: background 0.3s ease, color 0.3s ease;
    }

    .container {
      width: 100%;
      max-width: 640px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      padding: 3rem 2.5rem;
      text-align: center;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .quote-mark {
      font-size: 3.5rem;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 0.5rem;
      user-select: none;
    }

    .quote-text {
      font-size: 1.35rem;
      line-height: 1.7;
      color: var(--text);
      font-style: italic;
      min-height: 5rem;
      transition: opacity 0.35s ease;
    }

    .quote-author {
      margin-top: 1.5rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      transition: opacity 0.35s ease;
    }

    .quote-author::before {
      content: "— ";
    }

    .fade-out {
      opacity: 0;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      margin-top: 2rem;
    }

    button {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      border: none;
      border-radius: 0.5rem;
      padding: 0.7rem 1.5rem;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: var(--accent);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    .btn-secondary {
      background: var(--border);
      color: var(--muted);
    }

    .btn-secondary:hover {
      background: var(--accent-glow);
      color: var(--text);
    }

    .tag {
      display: inline-block;
      margin-top: 1.25rem;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      background: var(--accent-glow);
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      transition: opacity 0.35s ease;
    }

    .toolbar {
      position: fixed;
      top: 1.25rem;
      right: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.4rem 0.65rem;
      transition: background 0.3s ease, border-color 0.3s ease;
      z-index: 10;
    }

    .theme-toggle {
      background: none;
      border: none;
      color: var(--muted);
      width: 2rem;
      height: 2rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.05rem;
      transition: color 0.2s ease;
      padding: 0;
    }

    .theme-toggle:hover {
      color: var(--text);
    }

    .swatches {
      display: flex;
      gap: 0.35rem;
      align-items: center;
      padding-left: 0.4rem;
      border-left: 1px solid var(--border);
    }

    .swatch {
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 50%;
      border: 2px solid transparent;
      background: var(--sw);
      cursor: pointer;
      padding: 0;
      transition: border-color 0.2s ease, transform 0.15s ease;
    }

    .swatch:hover {
      transform: scale(1.2);
    }

    .swatch.active {
      border-color: var(--text);
    }

    .history-panel {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 1rem;
      margin-top: 1rem;
      padding: 1.25rem 1.5rem;
      transition: background 0.3s ease, border-color 0.3s ease;
    }

    .history-panel.hidden {
      display: none;
    }

    .history-title {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 0.75rem;
    }

    .history-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      max-height: 260px;
      overflow-y: auto;
    }

    .history-item {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      padding: 0.55rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.15s ease;
    }

    .history-item:hover {
      background: var(--accent-glow);
    }

    .history-item.current {
      background: var(--accent-glow);
      border-left: 3px solid var(--accent);
    }

    .history-item-text {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.85rem;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .history-item-author {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }

    .filter-pill {
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      background: var(--pill-bg);
      color: var(--muted);
      transition: background 0.2s ease, color 0.2s ease, transform 0.1s ease;
    }

    .filter-pill:hover {
      color: var(--text);
    }

    .filter-pill:active {
      transform: scale(0.95);
    }

    .filter-pill.active {
      background: var(--accent);
      color: var(--pill-active-text);
    }

    @media (max-width: 480px) {
      .card {
        padding: 2rem 1.5rem;
      }

      .quote-text {
        font-size: 1.15rem;
      }
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle light/dark">☀️</button>
    <div class="swatches" id="swatches">
      <button class="swatch active" data-color="indigo" style="--sw:#818cf8" aria-label="Indigo theme"></button>
      <button class="swatch" data-color="ocean" style="--sw:#22d3ee" aria-label="Ocean theme"></button>
      <button class="swatch" data-color="forest" style="--sw:#4ade80" aria-label="Forest theme"></button>
      <button class="swatch" data-color="sunset" style="--sw:#fb923c" aria-label="Sunset theme"></button>
      <button class="swatch" data-color="rose" style="--sw:#fb7185" aria-label="Rose theme"></button>
    </div>
  </div>

  <div class="container">
    <div class="filters" id="filters"></div>
    <div class="card">
      <div class="quote-mark">"</div>
      <p class="quote-text" id="quote-text"></p>
      <p class="quote-author" id="quote-author"></p>
      <span class="tag" id="quote-tag"></span>
      <div class="actions">
        <button class="btn-secondary" id="prev-quote" aria-label="Previous quote">&#8592;</button>
        <button class="btn-primary" id="new-quote">New Quote</button>
        <button class="btn-secondary" id="copy-quote">Copy</button>
        <button class="btn-secondary" id="toggle-history">History</button>
      </div>
    </div>

    <div class="history-panel hidden" id="history-panel">
      <h3 class="history-title">Recently Viewed</h3>
      <ul class="history-list" id="history-list"></ul>
    </div>
  </div>

  <script>
    const quotes = [
      { text: "The only way to do great work is to love what you do.", author: "Steve Jobs", tag: "Work" },
      { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein", tag: "Resilience" },
      { text: "It is not the strongest of the species that survives, nor the most intelligent, but the one most responsive to change.", author: "Charles Darwin", tag: "Adaptability" },
      { text: "The unexamined life is not worth living.", author: "Socrates", tag: "Philosophy" },
      { text: "Imagination is more important than knowledge. Knowledge is limited. Imagination encircles the world.", author: "Albert Einstein", tag: "Creativity" },
      { text: "I think, therefore I am.", author: "René Descartes", tag: "Philosophy" },
      { text: "The greatest glory in living lies not in never falling, but in rising every time we fall.", author: "Nelson Mandela", tag: "Resilience" },
      { text: "To be yourself in a world that is constantly trying to make you something else is the greatest accomplishment.", author: "Ralph Waldo Emerson", tag: "Individuality" },
      { text: "In three words I can sum up everything I've learned about life: it goes on.", author: "Robert Frost", tag: "Life" },
      { text: "Not everything that is faced can be changed, but nothing can be changed until it is faced.", author: "James Baldwin", tag: "Courage" },
      { text: "The mind is everything. What you think you become.", author: "Buddha", tag: "Mindset" },
      { text: "An investment in knowledge pays the best interest.", author: "Benjamin Franklin", tag: "Learning" },
      { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates", tag: "Wisdom" },
      { text: "Do not go where the path may lead, go instead where there is no path and leave a trail.", author: "Ralph Waldo Emerson", tag: "Courage" },
      { text: "Life is what happens when you're busy making other plans.", author: "John Lennon", tag: "Life" },
      { text: "We are what we repeatedly do. Excellence, then, is not an act, but a habit.", author: "Aristotle", tag: "Discipline" },
      { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb", tag: "Action" },
      { text: "It does not matter how slowly you go as long as you do not stop.", author: "Confucius", tag: "Persistence" },
      { text: "Everything you've ever wanted is on the other side of fear.", author: "George Addair", tag: "Courage" },
      { text: "What we know is a drop, what we don't know is an ocean.", author: "Isaac Newton", tag: "Humility" },
      { text: "Turn your wounds into wisdom.", author: "Oprah Winfrey", tag: "Growth" },
      { text: "The purpose of our lives is to be happy.", author: "Dalai Lama", tag: "Happiness" },
      { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky", tag: "Action" },
      { text: "Whether you think you can or you think you can't, you're right.", author: "Henry Ford", tag: "Mindset" },
      { text: "I have not failed. I've just found 10,000 ways that won't work.", author: "Thomas Edison", tag: "Persistence" },
      { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins", tag: "Action" },
      { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci", tag: "Wisdom" },
      { text: "One child, one teacher, one book, one pen can change the world.", author: "Malala Yousafzai", tag: "Education" },
      { text: "He who has a why to live can bear almost any how.", author: "Friedrich Nietzsche", tag: "Purpose" },
      { text: "Happiness is not something ready-made. It comes from your own actions.", author: "Dalai Lama", tag: "Happiness" },
    ];

    const textEl = document.getElementById("quote-text");
    const authorEl = document.getElementById("quote-author");
    const tagEl = document.getElementById("quote-tag");
    const newBtn = document.getElementById("new-quote");
    const copyBtn = document.getElementById("copy-quote");
    const prevBtn = document.getElementById("prev-quote");
    const historyBtn = document.getElementById("toggle-history");
    const historyPanel = document.getElementById("history-panel");
    const historyList = document.getElementById("history-list");
    const themeBtn = document.getElementById("theme-toggle");
    const swatchesEl = document.getElementById("swatches");
    const filtersEl = document.getElementById("filters");

    let activeFilter = "All";
    let lastIndex = -1;
    let currentQuote = null;
    const history = [];
    let historyPos = -1;

    // --- Light / Dark ---
    function applyMode(mode) {
      document.documentElement.setAttribute("data-theme", mode);
      themeBtn.textContent = mode === "light" ? "🌙" : "☀️";
      localStorage.setItem("quote-mode", mode);
    }

    themeBtn.addEventListener("click", () => {
      const current = document.documentElement.getAttribute("data-theme");
      applyMode(current === "light" ? "dark" : "light");
    });

    applyMode(localStorage.getItem("quote-mode") || "dark");

    // --- Color themes ---
    function applyColor(color) {
      if (color === "indigo") {
        document.documentElement.removeAttribute("data-color");
      } else {
        document.documentElement.setAttribute("data-color", color);
      }
      swatchesEl.querySelectorAll(".swatch").forEach(s => {
        s.classList.toggle("active", s.dataset.color === color);
      });
      localStorage.setItem("quote-color", color);
    }

    swatchesEl.addEventListener("click", (e) => {
      const swatch = e.target.closest(".swatch");
      if (swatch) applyColor(swatch.dataset.color);
    });

    applyColor(localStorage.getItem("quote-color") || "indigo");

    // --- Category filters ---
    const tags = ["All", ...Array.from(new Set(quotes.map(q => q.tag))).sort()];

    function buildFilters() {
      filtersEl.textContent = "";
      for (const tag of tags) {
        const pill = document.createElement("button");
        pill.className = "filter-pill" + (tag === activeFilter ? " active" : "");
        pill.textContent = tag;
        pill.addEventListener("click", () => {
          activeFilter = tag;
          buildFilters();
          showNewQuote();
        });
        filtersEl.appendChild(pill);
      }
    }

    buildFilters();

    // --- Quote display ---
    function getFiltered() {
      if (activeFilter === "All") return quotes;
      return quotes.filter(q => q.tag === activeFilter);
    }

    function pickRandom() {
      const pool = getFiltered();
      if (pool.length === 0) return null;
      if (pool.length === 1) return pool[0];
      let pick;
      do {
        pick = pool[Math.floor(Math.random() * pool.length)];
      } while (pick === currentQuote);
      return pick;
    }

    function displayQuote(q) {
      textEl.classList.add("fade-out");
      authorEl.classList.add("fade-out");
      tagEl.classList.add("fade-out");

      setTimeout(() => {
        if (!q) {
          textEl.textContent = "No quotes in this category.";
          authorEl.textContent = "";
          tagEl.textContent = "";
          currentQuote = null;
        } else {
          currentQuote = q;
          textEl.textContent = q.text;
          authorEl.textContent = q.author;
          tagEl.textContent = q.tag;
        }
        textEl.classList.remove("fade-out");
        authorEl.classList.remove("fade-out");
        tagEl.classList.remove("fade-out");
        updatePrevBtn();
        renderHistory();
      }, 350);
    }

    function showNewQuote() {
      const q = pickRandom();
      if (q) {
        if (historyPos < history.length - 1) {
          history.splice(historyPos + 1);
        }
        history.push(q);
        historyPos = history.length - 1;
      }
      displayQuote(q);
    }

    function goBack() {
      if (historyPos > 0) {
        historyPos--;
        displayQuote(history[historyPos]);
      }
    }

    function goToHistoryItem(idx) {
      historyPos = idx;
      displayQuote(history[historyPos]);
    }

    function updatePrevBtn() {
      prevBtn.disabled = historyPos <= 0;
      prevBtn.style.opacity = historyPos <= 0 ? "0.4" : "1";
    }

    // --- History panel ---
    function renderHistory() {
      historyList.textContent = "";
      for (let i = history.length - 1; i >= 0; i--) {
        const q = history[i];
        const li = document.createElement("li");
        li.className = "history-item" + (i === historyPos ? " current" : "");

        const textSpan = document.createElement("span");
        textSpan.className = "history-item-text";
        textSpan.textContent = q.text;

        const authorSpan = document.createElement("span");
        authorSpan.className = "history-item-author";
        authorSpan.textContent = q.author;

        li.appendChild(textSpan);
        li.appendChild(authorSpan);

        const idx = i;
        li.addEventListener("click", () => goToHistoryItem(idx));
        historyList.appendChild(li);
      }
    }

    historyBtn.addEventListener("click", () => {
      historyPanel.classList.toggle("hidden");
      renderHistory();
    });

    // --- Copy ---
    function copyQuote() {
      if (!currentQuote) return;
      const copyText = `"${currentQuote.text}" — ${currentQuote.author}`;
      navigator.clipboard.writeText(copyText).then(() => {
        const original = copyBtn.textContent;
        copyBtn.textContent = "Copied!";
        setTimeout(() => { copyBtn.textContent = original; }, 1500);
      });
    }

    // --- Events ---
    newBtn.addEventListener("click", showNewQuote);
    prevBtn.addEventListener("click", goBack);
    copyBtn.addEventListener("click", copyQuote);

    showNewQuote();
  </script>
</body>
</html>
